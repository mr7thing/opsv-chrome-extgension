<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>OpsV Companion</title>
  <style>
    /* Prompt Hover Effect */
    .job-prompt-text {
      cursor: pointer;
      padding: 3px 6px;
      margin: 4px 0;
      border-radius: 4px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.05);
      transition: all 0.2s;
    }
    .job-prompt-text:hover {
      background: rgba(123, 140, 255, 0.25);
      border-color: rgba(123, 140, 255, 0.5);
      color: #fff;
    }
    /* Reference Thumbnail Hover Effect */
    .job-thumbs img {
      cursor: pointer;
      transition: transform 0.15s, border-color 0.15s, opacity 0.15s;
    }
    .job-thumbs img:hover {
      transform: scale(1.08);
      box-shadow: 0 0 6px rgba(123, 140, 255, 0.4);
    }
    .job-thumbs img.selected {
      border: 2px solid #4caf50 !important;
      box-shadow: 0 0 8px rgba(76, 175, 80, 0.6);
      opacity: 1 !important;
    }
    .job-thumbs img:not(.selected) {
      opacity: 0.4;
      border: 1px solid #333;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 12px;
      background: #1a1a2e;
      color: #e0e0e0;
      font-size: 13px;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .header h3 {
      margin: 0;
      font-size: 15px;
      color: #7b8cff;
    }
    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .status {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #666;
    }
    .status.connected { background: #4caf50; }
    .status.disconnected { background: #f44336; }

    .mode-toggle {
      display: flex;
      background: #16213e;
      border-radius: 6px;
      overflow: hidden;
      margin-bottom: 12px;
    }
    .mode-btn {
      flex: 1;
      padding: 6px 12px;
      border: none;
      background: transparent;
      color: #888;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      transition: all 0.2s;
    }
    .mode-btn.active {
      background: #7b8cff;
      color: #fff;
    }

    .job-list {
      background: #16213e;
      border-radius: 8px;
      overflow-y: auto;
      max-height: 420px;
    }
    .job-item {
      padding: 10px;
      border-bottom: 1px solid #1a1a2e;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
    }
    .job-item:last-child { border-bottom: none; }
    .job-item.done { background-color: #0d2818; }
    .job-item.failed { background-color: #2e1111; }
    .job-item.running { background-color: #1a1a3e; }
    .job-item.dragover { border: 2px dashed #7b8cff; background-color: #1a1a3e; }

    .job-desc {
      font-size: 12px;
      color: #ccc;
      flex: 1;
      word-break: break-word;
    }
    .job-desc .job-id {
      font-weight: 700;
      color: #7b8cff;
      display: block;
      margin-bottom: 2px;
    }
    .job-desc .job-refs {
      font-size: 10px;
      color: #888;
      display: block;
      margin-top: 2px;
    }

    .job-thumbs {
      display: flex;
      gap: 4px;
      margin-top: 6px;
      flex-wrap: wrap;
    }
    .job-thumbs img {
      width: 48px;
      height: 48px;
      object-fit: cover;
      border-radius: 4px;
      border: 1px solid #333;
    }
    .job-status {
      font-size: 10px;
      font-weight: bold;
      padding: 2px 8px;
      border-radius: 4px;
      white-space: nowrap;
      background: #333;
    }
    .job-status.pending { background: #555; }
    .job-status.running { background: #2196f3; color: #fff; }
    .job-status.done { background: #4caf50; color: #fff; }
    .job-status.failed { background: #f44336; color: #fff; }

    .btn-primary {
      width: 100%;
      padding: 8px;
      background: #7b8cff;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      font-size: 12px;
      margin-top: 10px;
    }
    .btn-primary:disabled {
      background: #444;
      cursor: not-allowed;
    }
    .btn-stop {
      width: 100%;
      padding: 8px;
      background: #f44336;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      font-size: 12px;
      margin-top: 10px;
      display: none;
    }
    .btn-stop:hover {
      background: #d32f2f;
    }
    .btn-action {
      background: transparent;
      border: 1px solid #555;
      color: #ccc;
      padding: 3px 8px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 10px;
    }
    .btn-action:hover { border-color: #7b8cff; }

    .controls {
      display: flex;
      gap: 6px;
      margin-bottom: 10px;
    }
    .chk-label {
      font-size: 11px;
      color: #999;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .empty-state {
      padding: 30px 10px;
      text-align: center;
      color: #666;
      font-size: 12px;
    }
    .job-thumbs-container {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: 6px;
    }
    .thumb-section {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .thumb-label {
      font-size: 10px;
      color: #888;
      width: 45px;
      font-weight: bold;
    }
    .job-actions {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-top: 4px;
    }
    .btn-action-sm {
      background: #2b2b3e;
      border: 1px solid #444;
      color: #ccc;
      padding: 3px 6px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 9px;
      font-weight: bold;
      transition: all 0.1s;
      white-space: nowrap;
    }
    .btn-action-sm:hover {
      border-color: #7b8cff;
      background: #3a3a5e;
      color: #fff;
    }

    /* Saving Thumbnail Loader Styles */
    .saving-thumb {
      width: 48px;
      height: 48px;
      background: #111;
      border: 1px dashed #7b8cff;
      border-radius: 4px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 8px;
      color: #7b8cff;
      gap: 4px;
      box-sizing: border-box;
    }
    .pulse-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background-color: #7b8cff;
      animation: thumbPulse 1.5s infinite ease-in-out;
    }
    .saving-text {
      font-size: 8px;
      color: #888;
      transform: scale(0.9);
    }
    @keyframes thumbPulse {
      0% { transform: scale(0.8); opacity: 0.5; }
      50% { transform: scale(1.3); opacity: 1; }
      100% { transform: scale(0.8); opacity: 0.5; }
    }
  </style>
</head>
<body>
  <div class="header">
    <h3>OpsV Queue <span style="font-size:10px;color:#888;">v0.5.1</span></h3>
    <div class="status-row">
      <span id="mode-label" style="font-size:10px;color:#888;">AUTO</span>
      <div id="status-indicator" class="status disconnected" title="Disconnected"></div>
    </div>
  </div>

  <div class="mode-toggle">
    <button id="mode-auto" class="mode-btn active">Auto</button>
    <button id="mode-manual" class="mode-btn">Manual</button>
  </div>

  <div class="controls">
    <label class="chk-label">
      <input type="checkbox" id="remove-watermark-cb" checked> Remove watermark
    </label>
  </div>

  <div id="job-list" class="job-list">
    <div class="empty-state">Waiting for OPSV Daemon...</div>
  </div>

  <button id="run-all-btn" class="btn-primary" disabled>▶ Run All (0)</button>
  <button id="stop-btn" class="btn-stop">⏹ Stop</button>

  <div id="result-drop-hint" style="font-size:10px;color:#555;text-align:center;margin-top:8px;">
    💡 生成后可拖放结果图到对应任务保存增量
  </div>

  <script src="watermark-engine.js"></script>
  <script src="sidepanel.js"></script>
</body>
</html>
